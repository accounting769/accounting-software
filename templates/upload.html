<!DOCTYPE html>
<html>
<head>

<title>Accounting Report Generator</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
}

.container-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
margin-top:50px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="container-box">

<div class="title">
Accounting Report Generator
</div>

<form action="/generate" method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Invoice File</label>
<input type="file" class="form-control" name="invoice" required>
</div>

<div class="mb-3">
<label class="form-label">Bill File</label>
<input type="file" class="form-control" name="bill" required>
</div>

<div class="mb-3">
<label class="form-label">Expense File</label>
<input type="file" class="form-control" name="expense" required>
</div>

<div class="mb-3">
<label class="form-label">Vendor Credits</label>
<input type="file" class="form-control" name="vendor_credit" required>
</div>

<div class="mb-3">
<label class="form-label">Credit Notes</label>
<input type="file" class="form-control" name="credit_note" required>
</div>

<br>

<div class="text-center">

<button class="btn btn-primary btn-lg">
Generate VAT Report
</button>

</div>

</form>

</div>

</div>

</body>
</html>
